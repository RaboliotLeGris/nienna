version: "3.9"

services:
  pg:
    build: services/postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: "nienna"
      POSTGRES_USER: "nienna"
      POSTGRES_PASSWORD: "nienna"
    volumes:
      - pg:/var/lib/postgresql/data

  redis:
    build: services/redis
    restart: unless-stopped

  rabbitmq:
    build: services/rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "nienna"
      RABBITMQ_DEFAULT_PASS: "nienna123"
    volumes:
      - rabbitmq:/var/lib/rabbitmq

  s3:
    build: services/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "minio123"
    command: server /home/shared
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - s3:/data

  loadbalancer:
    build: services/nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - $PWD/.docker/services/nginx/nginx.conf:/etc/nginx/nginx.conf

volumes:
  pg:
  rabbitmq:
  s3: